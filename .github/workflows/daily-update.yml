name: Update ForecastRank

on:
  workflow_dispatch:
  schedule:
    - cron: "17 12 * * *"
      timezone: "America/Toronto"

permissions:
  contents: write

concurrency:
  group: forecastrank-daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Update forecasts and verification
        run: python scripts/update_forecastrank.py

      - name: Commit updated data
        shell: bash
        run: |
          git config user.name "ForecastRank Bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/

          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          git commit -m "Daily ForecastRank update"
          git push
