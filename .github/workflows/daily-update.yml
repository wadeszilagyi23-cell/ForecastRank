name: Update and Deploy ForecastRank

on:
  workflow_dispatch:

  schedule:
    - cron: "17 12 * * *"
      timezone: "America/Toronto"

  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: forecastrank-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        if: github.event_name != 'push'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Update forecasts and verification
        if: github.event_name != 'push'
        run: python scripts/update_forecastrank.py

      - name: Commit updated data
        if: github.event_name != 'push'
        shell: bash
        run: |
          git config user.name "ForecastRank Bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/

          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Daily ForecastRank update"
            git push
          fi

      - name: Prepare website
        shell: bash
        run: |
          mkdir -p _site
          cp index.html app.js styles.css _site/
          cp -r data _site/
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
